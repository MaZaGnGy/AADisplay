name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 👇 قمنا بتحديد إصدار 8.0 لمنع سحب إصدار 9.5.1 غير المتوافق مع المشروع
    - name: Download and Setup Compatible Gradle Wrapper
      run: gradle wrapper --gradle-version 8.0

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AADisplay-APK
        path: aa-display/build/outputs/apk/debug/*.apk
