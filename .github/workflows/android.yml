name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download and Setup Specific Gradle Wrapper
      run: gradle wrapper --gradle-version 8.13

    # 👇 خطوة حاسمة لزيادة حجم الذاكرة وتفادي خطأ الـ Metaspace
    - name: Configure Gradle Memory Settings
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" >> ~/.gradle/gradle.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 👇 البناء المباشر للـ APK مع تخطي الـ Lint والاعتماد على الذاكرة الموسعة
    - name: Build Debug APK
      run: ./gradlew assembleDebug -x lint

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AADisplay-APK
        path: aa-display/build/outputs/apk/debug/*.apk
